<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Crop Resize Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }

  /* 模拟 VueFlow viewport：fixed 容器，带 zoom */
  #viewport {
    position: relative;
    width: 800px;
    height: 600px;
    border: 2px solid #444;
    overflow: hidden;
    margin-bottom: 20px;
  }

  /* 模拟节点 */
  #fake-node {
    position: absolute;
    left: 100px;
    top: 50px;
    width: 300px;
    height: 400px;
    background: #333;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
  }

  /* === crop-overlay（与 ImageCropper.vue 结构一致） === */
  .crop-overlay {
    position: fixed;
    cursor: crosshair;
    touch-action: none;
    border-radius: 12px;
  }
  .crop-letterbox { position: absolute; background: rgba(0,0,0,0.55); pointer-events: none; }
  .crop-shade     { position: absolute; background: rgba(0,0,0,0.4); pointer-events: none; }
  .crop-frame     { position: absolute; cursor: move; box-shadow: 0 0 0 1px rgba(255,255,255,0.9); }
  .crop-grid      { position: absolute; inset: 0; pointer-events: none; }
  .grid-line      { position: absolute; background: rgba(255,255,255,0.45); }
  .grid-h { left:0; right:0; height:1px; }
  .grid-v { top:0; bottom:0; width:1px; }
  .crop-handle {
    position: absolute; width:10px; height:10px;
    background:#fff; border:1.5px solid rgba(0,0,0,0.5);
    border-radius:2px; z-index:5;
  }
  .nw{top:-5px;left:-5px;cursor:nw-resize} .ne{top:-5px;right:-5px;cursor:ne-resize}
  .sw{bottom:-5px;left:-5px;cursor:sw-resize} .se{bottom:-5px;right:-5px;cursor:se-resize}
  .n{top:-5px;left:50%;margin-left:-5px;cursor:n-resize} .s{bottom:-5px;left:50%;margin-left:-5px;cursor:s-resize}
  .w{top:50%;left:-5px;margin-top:-5px;cursor:w-resize} .e{top:50%;right:-5px;margin-top:-5px;cursor:e-resize}

  #log { white-space: pre-wrap; font-size: 12px; line-height: 1.6; max-height: 200px; overflow:auto; }
  .pass { color: #4ade80; } .fail { color: #f87171; }
</style>
</head>
<body>

<h3>Crop Resize 最小测试</h3>
<div id="viewport">
  <div id="fake-node">Fake Node 300×400</div>
</div>
<div id="log"></div>

<script>
// ==================== 参数（模拟 VueFlow） ====================
const IMAGE_W = 600, IMAGE_H = 800;
const NODE = { x: 100, y: 50, w: 300, h: 400 };
const ZOOM = 1.5;
const VIEWPORT = { x: 0, y: 0, zoom: ZOOM };
const MIN_CROP = 20;

// ==================== 容器几何（与 wrapperStyle 一致） ====================
const containerW = NODE.w * ZOOM;  // 450
const containerH = NODE.h * ZOOM;  // 600
const left = NODE.x * ZOOM + VIEWPORT.x;  // 150
const top  = NODE.y * ZOOM + VIEWPORT.y;  // 75

// ==================== display（与 ImageCropper computed 一致） ====================
const ca = containerW / containerH;
const ia = IMAGE_W / IMAGE_H;
let dw, dh, ox, oy;
if (ia > ca) { dw = containerW; dh = containerW / ia; ox = 0; oy = (containerH - dh) / 2; }
else { dh = containerH; dw = containerH * ia; ox = (containerW - dw) / 2; oy = 0; }
const scale = dw / IMAGE_W;
const display = { dw, dh, ox, oy, scale };

// ==================== crop 状态（图像像素） ====================
const crop = { x: 0, y: 0, w: 0, h: 0 };
function initCrop() {
  const size = Math.min(IMAGE_W, IMAGE_H) * 0.8;
  crop.x = Math.round((IMAGE_W - size) / 2);
  crop.y = Math.round((IMAGE_H - size) / 2);
  crop.w = Math.round(size);
  crop.h = Math.round(size);
}
initCrop();

// ==================== clamp ====================
function clamp(nx, ny, nw, nh) {
  nx = Math.max(0, nx); ny = Math.max(0, ny);
  nw = Math.max(MIN_CROP, nw); nh = Math.max(MIN_CROP, nh);
  if (nx + nw > IMAGE_W) nx = IMAGE_W - nw;
  if (ny + nh > IMAGE_H) ny = IMAGE_H - nh;
  return { x: nx, y: ny, w: nw, h: nh };
}

// ==================== DOM 构建 ====================
const overlay = document.createElement('div');
overlay.className = 'crop-overlay';
overlay.style.cssText = `position:fixed;left:${left}px;top:${top}px;width:${containerW}px;height:${containerH}px;z-index:100;border-radius:12px;pointer-events:auto;`;
document.body.appendChild(overlay);

const lb1=mk('crop-letterbox'), lb2=mk('crop-letterbox'), lb3=mk('crop-letterbox'), lb4=mk('crop-letterbox');
const sh1=mk('crop-shade'), sh2=mk('crop-shade'), sh3=mk('crop-shade'), sh4=mk('crop-shade');
const frame=mk('crop-frame');
const grid=mk('crop-grid');
frame.appendChild(grid);
['nw','ne','sw','se','n','s','w','e'].forEach(d=>{const h=mk('crop-handle');h.className='crop-handle '+d;frame.appendChild(h);});
overlay.append(lb1,lb2,lb3,lb4,sh1,sh2,sh3,sh4,frame);
function mk(c){const e=document.createElement('div');e.className=c;return e;}

// ==================== 渲染 ====================
function render() {
  const d = display;
  setStyle(lb1, {top:'0',left:'0',width:containerW+'px',height:d.oy+'px'});
  setStyle(lb2, {top:(d.oy+d.dh)+'px',left:'0',width:containerW+'px',height:(containerH-d.oy-d.dh)+'px'});
  setStyle(lb3, {top:d.oy+'px',left:'0',width:d.ox+'px',height:d.dh+'px'});
  setStyle(lb4, {top:d.oy+'px',left:(d.ox+d.dw)+'px',width:(containerW-d.ox-d.dw)+'px',height:d.dh+'px'});

  const fL = d.ox + crop.x * d.scale;
  const fT = d.oy + crop.y * d.scale;
  const fW = crop.w * d.scale;
  const fH = crop.h * d.scale;

  setStyle(frame, {left:fL+'px',top:fT+'px',width:fW+'px',height:fH+'px'});

  setStyle(sh1, {top:'0',left:'0',width:containerW+'px',height:fT+'px'});
  setStyle(sh2, {top:(fT+fH)+'px',left:'0',width:containerW+'px',height:(containerH-fT-fH)+'px'});
  setStyle(sh3, {top:fT+'px',left:'0',width:fL+'px',height:fH+'px'});
  setStyle(sh4, {top:fT+'px',left:(fL+fW)+'px',width:(containerW-fL-fW)+'px',height:fH+'px'});
}
function setStyle(el, s){ Object.assign(el.style, s); }
render();

// ==================== 拖拽（修复后的正确逻辑） ====================
let drag = null;
const overlayEl = overlay;

overlay.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const dir = e.target.className.match(/crop-handle (\w)/)?.[1] || null;
  if (dir) {
    drag = { kind:'resize', dir, sx:e.clientX, sy:e.clientY, scX:crop.x, scY:crop.y, scW:crop.w, scH:crop.h };
  } else if (e.target === frame || e.target === grid) {
    drag = { kind:'move', sx:e.clientX, sy:e.clientY, scX:crop.x, scY:crop.y };
  } else return;
  overlayEl.setPointerCapture(e.pointerId);
});

overlay.addEventListener('pointermove', (e) => {
  if (!drag) return;
  const d = drag;
  // 屏幕像素 delta → 图像像素 delta
  const dx = (e.clientX - d.sx) / display.scale;
  const dy = (e.clientY - d.sy) / display.scale;

  if (d.kind === 'move') {
    const r = clamp(d.scX + dx, d.scY + dy, crop.w, crop.h);
    crop.x=r.x; crop.y=r.y;
  } else {
    // === 正确的 resize 逻辑 ===
    const right = d.scX + d.scW;
    const bottom = d.scY + d.scH;
    let nx=d.scX, ny=d.scY, nw=d.scW, nh=d.scH;

    // X 轴
    if (d.dir.includes('w')) {
      nx = Math.max(0, Math.min(d.scX + dx, right - MIN_CROP));
      nw = right - nx;
    } else if (d.dir.includes('e')) {
      nx = d.scX;
      nw = Math.max(MIN_CROP, Math.min(d.scW + dx, IMAGE_W - nx));
    }

    // Y 轴
    if (d.dir.includes('n')) {
      ny = Math.max(0, Math.min(d.scY + dy, bottom - MIN_CROP));
      nh = bottom - ny;
    } else if (d.dir.includes('s')) {
      ny = d.scY;
      nh = Math.max(MIN_CROP, Math.min(d.scH + dy, IMAGE_H - ny));
    }

    const r = clamp(nx, ny, nw, nh);
    crop.x=r.x; crop.y=r.y; crop.w=r.w; crop.h=r.h;
  }
  render();
  logState(e);
});

overlay.addEventListener('pointerup', (e) => {
  drag = null;
  overlayEl.releasePointerCapture(e.pointerId);
});

// ==================== 日志 ====================
const logEl = document.getElementById('log');
function logState(e) {
  logEl.textContent =
    `pointer: (${e.clientX}, ${e.clientY})\n` +
    `crop (image px): x=${crop.x.toFixed(1)} y=${crop.y.toFixed(1)} w=${crop.w.toFixed(1)} h=${crop.h.toFixed(1)}\n` +
    `frame (screen px): left=${(display.ox+crop.x*display.scale).toFixed(1)} top=${(display.oy+crop.y*display.scale).toFixed(1)}\n` +
    `                w=${(crop.w*display.scale).toFixed(1)} h=${(crop.h*display.scale).toFixed(1)}\n` +
    `scale=${display.scale.toFixed(4)} zoom=${ZOOM}\n` +
    `drag=${drag ? drag.kind+'/'+drag.dir : 'null'}`;
}

// ==================== 自动化断言测试 ====================
function assert(name, cond) {
  const el = document.createElement('div');
  el.textContent = `${cond ? '✅ PASS' : '❌ FAIL'}: ${name}`;
  el.className = cond ? 'pass' : 'fail';
  logEl.appendChild(el);
}

function runTests() {
  // Test 1: se 拖拽 — 宽高应增加
  initCrop();
  const w0 = crop.w, h0 = crop.h, x0 = crop.x, y0 = crop.y;
  // 模拟 se 拖拽 +50 image px
  drag = { kind:'resize', dir:'se', sx:0, sy:0, scX:x0, scY:y0, scW:w0, scH:h0 };
  // 模拟 pointermove: screen delta = 50 * scale
  const fakeEvent = { clientX: 50 * display.scale, clientY: 50 * display.scale };
  const d = drag;
  const dx = (fakeEvent.clientX - d.sx) / display.scale;  // = 50
  const dy = (fakeEvent.clientY - d.sy) / display.scale;  // = 50
  const right = d.scX + d.scW;
  const bottom = d.scY + d.scH;
  let nx=d.scX, ny=d.scY, nw=d.scW, nh=d.scH;
  if (d.dir.includes('w')) { nx = Math.max(0, Math.min(d.scX + dx, right - MIN_CROP)); nw = right - nx; }
  else if (d.dir.includes('e')) { nx = d.scX; nw = Math.max(MIN_CROP, Math.min(d.scW + dx, IMAGE_W - nx)); }
  if (d.dir.includes('n')) { ny = Math.max(0, Math.min(d.scY + dy, bottom - MIN_CROP)); nh = bottom - ny; }
  else if (d.dir.includes('s')) { ny = d.scY; nh = Math.max(MIN_CROP, Math.min(d.scH + dy, IMAGE_H - ny)); }
  const r1 = clamp(nx, ny, nw, nh);
  assert('se: width increases by ~50', Math.abs((r1.w - w0) - 50) < 1);
  assert('se: height increases by ~50', Math.abs((r1.h - h0) - 50) < 1);
  assert('se: x unchanged', r1.x === x0);
  assert('se: y unchanged', r1.y === y0);

  // Test 2: nw 拖拽 — x/y 应变，宽高反向
  drag = { kind:'resize', dir:'nw', sx:0, sy:0, scX:x0, scY:y0, scW:w0, scH:h0 };
  const d2 = drag;
  const dx2 = 30, dy2 = 30;
  const right2 = d2.scX + d2.scW;
  const bottom2 = d2.scY + d2.scH;
  let nx2=d2.scX, ny2=d2.scY, nw2=d2.scW, nh2=d2.scH;
  if (d2.dir.includes('w')) { nx2 = Math.max(0, Math.min(d2.scX + dx2, right2 - MIN_CROP)); nw2 = right2 - nx2; }
  if (d2.dir.includes('n')) { ny2 = Math.max(0, Math.min(d2.scY + dy2, bottom2 - MIN_CROP)); nh2 = bottom2 - ny2; }
  const r2 = clamp(nx2, ny2, nh2, nh2);
  assert('nw: x increases by ~30', Math.abs((r2.x - x0) - 30) < 1);
  assert('nw: width decreases by ~30', Math.abs((w0 - r2.w) - 30) < 1);

  // Test 3: e 拖拽 — 只改宽度
  drag = { kind:'resize', dir:'e', sx:0, sy:0, scX:x0, scY:y0, scW:w0, scH:h0 };
  const d3 = drag;
  const dx3 = -40;
  let nx3=d3.scX, ny3=d3.scY, nw3=d3.scW, nh3=d3.scH;
  if (d3.dir.includes('e')) { nx3 = d3.scX; nw3 = Math.max(MIN_CROP, Math.min(d3.scW + dx3, IMAGE_W - nx3)); }
  const r3 = clamp(nx3, ny3, nw3, nh3);
  assert('e: width decreases by ~40', Math.abs((w0 - r3.w) - 40) < 1);
  assert('e: height unchanged', r3.h === h0);
  assert('e: y unchanged', r3.y === y0);

  drag = null;
  render();
  logState({clientX:0, clientY:0});
}

// 先跑测试，再覆盖交互日志
runTests();
</script>
</body>
</html>
