<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>级联动态菜单</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .menu-glass {
      background: rgba(255, 255, 255, 0.80);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }
    .submenu-glass {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 10px 20px 40px rgba(0, 0, 0, 0.10);
    }
    .transition-custom {
      transition: 
        opacity 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        top 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }
  </style>
</head>
<body class="bg-[#f0f2f5] text-gray-700 min-h-screen flex items-center justify-center font-sans antialiased overflow-hidden">

  <div class="absolute inset-0 bg-[linear-gradient(to_right,#e0e0e020_1px,transparent_1px),linear-gradient(to_bottom,#e0e0e020_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)] pointer-events-none"></div>

  <div class="relative flex items-start space-x-2 z-10 p-8">
    
    <div class="w-64 menu-glass rounded-2xl p-2 flex flex-col space-y-1 relative transition-all duration-300">
      
      <!-- GRSAI -->
      <div class="group flex items-center justify-between px-3 h-[52px] rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200" onmouseenter="hideSubmenus()">
        <div class="flex items-center space-x-3">
          <div class="w-6 h-6 rounded-lg bg-indigo-100 border border-indigo-300 flex items-center justify-center text-xs font-bold text-indigo-600">G</div>
          <span class="text-sm font-medium text-gray-700">GRSAI</span>
        </div>
        <i data-lucide="plus" class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors"></i>
      </div>

      <!-- 即梦 -->
      <div class="group flex items-center justify-between px-3 h-[52px] rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200" onmouseenter="hideSubmenus()">
        <div class="flex items-center space-x-3">
          <div class="w-6 h-6 rounded-lg bg-sky-100 flex items-center justify-center">
            <i data-lucide="compass" class="w-4 h-4 text-sky-600"></i>
          </div>
          <span class="text-sm font-medium text-gray-700">即梦</span>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors"></i>
      </div>

      <!-- AICanvas -->
      <div class="group flex items-center justify-between px-3 h-[52px] rounded-xl cursor-not-allowed opacity-50" onmouseenter="hideSubmenus()">
        <div class="flex items-center space-x-3">
          <div class="w-6 h-6 rounded-lg bg-purple-100 flex items-center justify-center">
            <i data-lucide="layers" class="w-4 h-4 text-purple-500"></i>
          </div>
          <span class="text-sm font-medium text-gray-500">AICanvas</span>
        </div>
        <span class="text-[10px] bg-red-100 text-red-500 px-1.5 py-0.5 rounded border border-red-300">不可用</span>
      </div>

      <!-- APIMart -->
      <div class="group flex items-center justify-between px-3 h-[52px] rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200" onmouseenter="hideSubmenus()">
        <div class="flex items-center space-x-3">
          <div class="w-6 h-6 rounded-lg bg-amber-100 flex items-center justify-center">
            <i data-lucide="database" class="w-4 h-4 text-amber-600"></i>
          </div>
          <span class="text-sm font-medium text-gray-700">APIMart</span>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors"></i>
      </div>

      <!-- RunningHUB 模型 -->
      <div class="group flex items-center justify-between px-3 h-[52px] rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-300" 
           onmouseenter="showSubmenu('model-submenu', this)" id="model-trigger">
        <div class="flex items-center space-x-3 overflow-hidden w-full h-full">
          <div class="w-6 h-6 rounded-lg bg-emerald-100 flex items-center justify-center font-bold text-xs text-emerald-600 shrink-0">R</div>
          <div class="relative h-10 flex flex-col justify-center min-w-0 w-full overflow-hidden">
            <span class="text-sm font-medium text-gray-700 block transition-transform duration-300 ease-out translate-y-[0px] group-hover:translate-y-[-6px]">
              RunningHUB 模型
            </span>
            <span class="text-[10px] text-gray-400 block whitespace-nowrap absolute bottom-0 left-0 opacity-0 translate-y-2 group-hover:translate-y-[1px] group-hover:opacity-100 transition-all duration-300 ease-out">
              模型 API: 文本/图生图/图片
            </span>
          </div>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors shrink-0"></i>
      </div>

      <!-- RunningHUB 工作流 -->
      <div class="group flex items-center justify-between px-3 h-[52px] rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-300"
           onmouseenter="showSubmenu('workflow-submenu', this)" id="workflow-trigger">
        <div class="flex items-center space-x-3 overflow-hidden w-full h-full">
          <div class="w-6 h-6 rounded-lg bg-teal-100 flex items-center justify-center font-bold text-xs text-teal-600 shrink-0">R</div>
          <div class="relative h-10 flex flex-col justify-center min-w-0 w-full overflow-hidden">
            <span class="text-sm font-medium text-gray-700 block transition-transform duration-300 ease-out translate-y-[0px] group-hover:translate-y-[-6px]">
              RunningHUB 工作流
            </span>
            <span class="text-[10px] text-gray-400 block whitespace-nowrap absolute bottom-0 left-0 opacity-0 translate-y-2 group-hover:translate-y-[1px] group-hover:opacity-100 transition-all duration-300 ease-out">
              工作流转API/一键迁移/多...
            </span>
          </div>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors shrink-0"></i>
      </div>

    </div>

    <!-- 二级菜单 -->
    <div class="relative w-64 h-[380px] pointer-events-none">
      
      <div id="model-submenu" class="absolute inset-x-0 w-64 submenu-glass rounded-2xl p-2 flex flex-col space-y-1 opacity-0 translate-x-[-12px] scale-[0.96] transition-custom pointer-events-none z-20">
        
        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i>
            <span class="text-sm font-medium text-gray-700">NanoBanana 低价版</span>
          </div>
        </div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="sparkles" class="w-4 h-4 text-yellow-500"></i>
            <span class="text-sm font-medium text-gray-700">NanoBanana 官方版</span>
          </div>
        </div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="zap" class="w-4 h-4 text-amber-600"></i>
            <span class="text-sm font-medium text-gray-700">BananaPRO 低价版</span>
          </div>
        </div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="award" class="w-4 h-4 text-emerald-600"></i>
            <span class="text-sm font-medium text-gray-700">BananaPRO 官方版</span>
          </div>
        </div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="activity" class="w-4 h-4 text-sky-600"></i>
            <span class="text-sm font-medium text-gray-700">Banana2 低价版</span>
          </div>
        </div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="shield-check" class="w-4 h-4 text-blue-600"></i>
            <span class="text-sm font-medium text-gray-700">Banana2 官方版</span>
          </div>
        </div>

        <div class="h-[1px] bg-gray-200 my-1"></div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="image" class="w-4 h-4 text-purple-500"></i>
            <span class="text-sm font-medium text-gray-700">GPT image 2</span>
          </div>
        </div>
      </div>

      <div id="workflow-submenu" class="absolute inset-x-0 w-64 submenu-glass rounded-2xl p-2 flex flex-col space-y-1 opacity-0 translate-x-[-12px] scale-[0.96] transition-custom pointer-events-none z-20">
        
        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="user-cog" class="w-4 h-4 text-indigo-500"></i>
            <span class="text-sm font-medium text-gray-700">人物替换图片编辑V3</span>
          </div>
        </div>

        <div class="submenu-item flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer hover:bg-gray-200 transition-colors duration-200">
          <div class="flex items-center space-x-3">
            <i data-lucide="smile" class="w-4 h-4 text-pink-500"></i>
            <span class="text-sm font-medium text-gray-700">漫画转真人</span>
          </div>
        </div>
        
      </div>

    </div>
  </div>

  <script>
    lucide.createIcons();

    function showSubmenu(id, triggerElement) {
      ['model-submenu', 'workflow-submenu'].forEach(subId => {
        const el = document.getElementById(subId);
        el.classList.add('opacity-0', 'translate-x-[-12px]', 'scale-[0.96]', 'pointer-events-none');
        el.classList.remove('opacity-100', 'translate-x-0', 'scale-100', 'pointer-events-auto');
      });

      const submenu = document.getElementById(id);
      submenu.style.top = triggerElement.offsetTop + 'px';
      submenu.classList.remove('opacity-0', 'translate-x-[-12px]', 'scale-[0.96]', 'pointer-events-none');
      submenu.classList.add('opacity-100', 'translate-x-0', 'scale-100', 'pointer-events-auto');

      const items = submenu.querySelectorAll('.submenu-item');
      items.forEach((item, index) => {
        item.style.opacity = '0';
        item.style.transform = 'translateY(4px)';
        item.style.transition = 'all 0.2s ease';
        setTimeout(() => {
          item.style.opacity = '1';
          item.style.transform = 'translateY(0)';
        }, 30 + index * 20);
      });
    }

    function hideSubmenus() {
      ['model-submenu', 'workflow-submenu'].forEach(subId => {
        const el = document.getElementById(subId);
        el.classList.add('opacity-0', 'translate-x-[-12px]', 'scale-[0.96]', 'pointer-events-none');
        el.classList.remove('opacity-100', 'translate-x-0', 'scale-100', 'pointer-events-auto');
      });
    }

    document.addEventListener('click', (e) => {
      const isTrigger = e.target.closest('#model-trigger') || e.target.closest('#workflow-trigger');
      const isSubmenu = e.target.closest('.submenu-glass');
      if (!isTrigger && !isSubmenu) hideSubmenus();
    });
  </script>
</body>
</html>
